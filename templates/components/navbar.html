{% load static %}
<!-- Navbar — Clean Slate/teal Theme -->
<div class="navbar bg-white border-b border-slate-200 shadow-sm fixed top-0 z-50 w-full px-3 sm:px-5 min-h-0 h-14 sm:h-16">

  <!-- Left: Logo + Toggle -->
  <div class="navbar-start gap-2 sm:gap-3">
    <div class="flex items-center gap-2 sm:gap-3">
      <div style="width: 36px; height: 36px; min-width: 36px; min-height: 36px; background: #0d9488; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <!-- Logo: Ganti dengan logo perusahaan Anda -->
        <svg style="width: 20px; height: 20px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 00-1-1h-2a1 1 0 00-1 1v5m4 0H9"></path></svg>
      </div>
      <div class="hidden sm:block">
        <p class="text-sm font-semibold text-slate-800 leading-tight">Your HRIS</p>
        <p class="text-xs text-slate-400 leading-tight">Human Resources System</p>
      </div>
      <p class="sm:hidden text-sm font-semibold text-slate-800">HRIS</p>
    </div>

    <button id="sidebarToggle" class="btn btn-ghost btn-circle btn-xs sm:btn-sm text-slate-500 hover:bg-slate-100 ml-1">
      <svg id="menuIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
      <svg id="closeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <!-- Center: empty -->
  <div class="navbar-center"></div>

  <!-- Right: User dropdown -->
  <div class="navbar-end">
    <div class="dropdown dropdown-end">
      <label tabindex="0" class="btn btn-ghost btn-sm gap-2 hover:bg-slate-50 px-2 sm:px-3">
        <!-- Avatar initialed circle -->
        <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-teal-100 flex items-center justify-center shrink-0">
          <span class="text-teal-700 font-semibold text-sm leading-none">
            {{ user.employee.full_name|slice:":1"|upper }}
          </span>
        </div>
        <div class="hidden md:block text-left">
          <p class="text-sm font-medium text-slate-700 leading-tight">{{ user.employee.full_name }}</p>
          <p class="text-xs text-slate-400 leading-tight">{{ user.employee.npp }}</p>
        </div>
        <svg class="w-4 h-4 text-slate-400 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </label>
      <ul tabindex="0" class="dropdown-content menu p-2 shadow-lg bg-white rounded-xl w-52 mt-2 border border-slate-100">
        <li class="menu-title px-3 pt-1 pb-0">
          <span class="text-xs text-slate-400">Akun Saya</span>
        </li>
        <li>
          <a href="/profile/" class="text-slate-600 hover:bg-teal-50 hover:text-teal-700 rounded-lg text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            My Profile
          </a>
        </li>
        <div class="divider my-1 h-px bg-slate-100"></div>
        <li>
          <a href="/logout/" class="text-red-500 hover:bg-red-50 hover:text-red-600 rounded-lg text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
