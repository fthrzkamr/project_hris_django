{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - HRIS Dua Farma Groups</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <style>
      .bg-pattern {
        background-image: url("{% static 'images/hris-background.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body class="h-screen flex items-center justify-center overflow-hidden p-2 sm:p-4 bg-pattern relative">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-gradient-to-br from-sky-900/40 via-cyan-800/30 to-blue-900/40 backdrop-blur-sm"></div>
    <!-- Login Container -->
    <div class="w-full max-w-md mx-auto relative z-10">
      <!-- Card -->
      <div class="bg-white/80 backdrop-blur-lg rounded-2xl sm:rounded-3xl shadow-xl shadow-sky-200/50 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-sky-500 to-cyan-600 px-4 sm:px-6 pt-2 pb-1 sm:pt-2.5 sm:pb-1.5 text-center">
          <img src="{% static 'images/logoduafarma.png' %}" alt="Dua Farma Groups Logo" class="w-24 h-24 sm:w-28 sm:h-28 object-contain mx-auto -mb-3 sm:-mb-4">
          <h2 class="text-base sm:text-lg md:text-xl font-bold text-white mb-0.5">Dua Farma Groups</h2>
          <p class="text-sky-100 text-[9px] sm:text-[10px] font-light">Human Resources Information System</p>
        </div>

        <!-- Form -->
        <div class="px-4 sm:px-6 py-4 sm:py-5">
          <!-- Messages -->
          {% if messages %}
          <div class="mb-2.5 sm:mb-3 space-y-1.5">
            {% for message in messages %}
            <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg shadow-sm">
              <div class="flex items-center">
                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 mr-1.5 sm:mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-[10px] sm:text-xs font-medium">{{ message }}</span>
              </div>
            </div>
            {% endfor %}
          </div>
          {% endif %}

          <form method="post" class="space-y-3 sm:space-y-3.5">
            {% csrf_token %}
            
            <!-- NPP Input -->
            <div>
              <label for="npp" class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1">
                NIP (Employee ID)
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-2.5 sm:pl-3 flex items-center pointer-events-none">
                  <svg class="w-4 h-4 sm:w-4.5 sm:h-4.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path>
                  </svg>
                </div>
                <input
                  type="text"
                  id="npp"
                  name="npp"
                  placeholder="Enter your NPP"
                  required
                  autofocus
                  class="w-full pl-9 sm:pl-10 pr-3 py-2 sm:py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition duration-200 ease-in-out hover:bg-gray-100"
                />
              </div>
            </div>

            <!-- Password Input -->
            <div>
              <label for="password" class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1">
                Password
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-2.5 sm:pl-3 flex items-center pointer-events-none">
                  <svg class="w-4 h-4 sm:w-4.5 sm:h-4.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                  </svg>
                </div>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                  class="w-full pl-9 sm:pl-10 pr-3 py-2 sm:py-2.5 text-sm bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition duration-200 ease-in-out hover:bg-gray-100"
                />
              </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center justify-between pt-0.5">
              <label class="flex items-center cursor-pointer group">
                <input type="checkbox" class="w-3.5 h-3.5 text-sky-600 bg-gray-100 border-gray-300 rounded focus:ring-sky-500 focus:ring-2 transition">
                <span class="ml-1.5 sm:ml-2 text-[10px] sm:text-xs text-gray-600 group-hover:text-gray-800">Remember me</span>
              </label>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="w-full bg-gradient-to-r from-sky-600 to-cyan-600 hover:from-sky-700 hover:to-cyan-700 text-white font-semibold py-2 sm:py-2.5 px-4 rounded-xl shadow-lg shadow-sky-500/50 hover:shadow-xl hover:shadow-sky-600/50 transform hover:-translate-y-0.5 transition duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 text-sm"
            >
              <span class="flex items-center justify-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                </svg>
                Sign In
              </span>
            </button>
          </form>

          <!-- Footer -->
          <div class="mt-3.5 sm:mt-4 pt-3 sm:pt-3.5 border-t border-gray-200 text-center">
            <p class="text-[10px] sm:text-xs text-gray-500">
              Need help? 
              <a href="#" class="font-medium text-sky-600 hover:text-sky-500 transition">
                Contact IT Support
              </a>
            </p>
          </div>
        </div>
      </div>

      <!-- Copyright -->
      <div class="text-center mt-2 sm:mt-3">
        <p class="text-[10px] sm:text-xs text-white font-medium drop-shadow-lg">
          © 2026 Dua Farma Groups. All rights reserved.
        </p>
      </div>
    </div>
  </body>
</html>
